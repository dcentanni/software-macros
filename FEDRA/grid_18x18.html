<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>18x18 Grid</title>
<style>
  :root {
    --white: #ffffff;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --border: #333;
  }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #1c1c1c;
    color: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    margin: 0;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 4px;
  }
  p.info {
    color: #bbb;
    font-size: 13px;
    margin-top: 0;
    margin-bottom: 16px;
    text-align: center;
    max-width: 500px;
  }
  #grid-wrapper {
    display: grid;
    grid-template-columns: 34px 1fr;
    grid-template-rows: 20px 1fr;
    position: relative;
  }
  #corner {
    grid-column: 1;
    grid-row: 1;
  }
  #col-labels {
    grid-column: 2;
    grid-row: 1;
    display: grid;
    grid-template-columns: repeat(18, 28px);
    gap: 2px;
    padding: 0 2px;
  }
  #row-labels {
    grid-column: 1;
    grid-row: 2;
    display: grid;
    grid-template-rows: repeat(18, 28px);
    gap: 2px;
    padding: 2px 0;
  }
  .axis-label {
    font-size: 10px;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #grid {
    grid-column: 2;
    grid-row: 2;
    display: grid;
    grid-template-columns: repeat(18, 28px);
    grid-template-rows: repeat(18, 28px);
    gap: 2px;
    background: var(--border);
    padding: 2px;
    border: 2px solid var(--border);
  }
  .cell {
    width: 28px;
    height: 28px;
    background: var(--white);
    cursor: pointer;
    box-sizing: border-box;
    transition: background 0.1s ease;
    position: relative;
  }
  .cell:hover {
    outline: 1px solid #888;
    outline-offset: -1px;
  }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #000;
    color: #fff;
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid #555;
    display: none;
    z-index: 10;
    white-space: nowrap;
  }
  #controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #3a3a3a;
    color: #f0f0f0;
    border: 1px solid #555;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background: #4a4a4a;
  }
  #legend {
    margin-top: 16px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 13px;
    color: #ccc;
    max-width: 560px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-count {
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  .swatch {
    width: 14px;
    height: 14px;
    border: 1px solid #555;
    display: inline-block;
  }
  #palette-panel {
    margin-top: 24px;
    background: #262626;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 14px 16px;
    width: 100%;
    max-width: 560px;
    box-sizing: border-box;
  }
  #palette-panel h2 {
    font-size: 14px;
    margin: 0 0 10px 0;
    color: #ddd;
  }
  #palette-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }
  .palette-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .palette-row input[type="color"] {
    width: 32px;
    height: 28px;
    padding: 0;
    border: 1px solid #555;
    border-radius: 4px;
    background: none;
    cursor: pointer;
  }
  .palette-row input[type="text"] {
    flex: 1;
    background: #1c1c1c;
    color: #f0f0f0;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 13px;
  }
  .palette-row .remove-color {
    background: #4a2626;
    color: #f0a0a0;
    border: 1px solid #6a3333;
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px;
  }
  .palette-row .remove-color:hover {
    background: #5a2c2c;
  }
  .palette-row .remove-color:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  #paletteBtns {
    display: flex;
    gap: 10px;
  }
  #paletteBtns button {
    font-size: 13px;
    padding: 6px 12px;
  }
  #status {
    margin-top: 10px;
    font-size: 13px;
    color: #8fdc8f;
    min-height: 18px;
  }
  #log {
    margin-top: 8px;
    font-size: 12px;
    color: #e8a35c;
    max-width: 500px;
    max-height: 140px;
    overflow-y: auto;
    text-align: left;
    background: #262626;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 8px 10px;
    display: none;
  }
  #log div {
    margin-bottom: 2px;
  }
  #log .log-title {
    color: #ccc;
    font-weight: bold;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<h1>18x18 Grid</h1>
<p class="info">
  Click a cell to cycle through the active color palette. Hover over a cell to see its name.
  Use the panel below the grid to add, remove, rename or recolor the palette entries.
</p>

<div id="grid-wrapper">
  <div id="corner"></div>
  <div id="col-labels"></div>
  <div id="row-labels"></div>
  <div id="grid"></div>
</div>

<div id="tooltip"></div>

<div id="legend"></div>

<div id="palette-panel">
  <h2>Color palette</h2>
  <div id="palette-list"></div>
  <div id="paletteBtns">
    <button id="addColorBtn">+ Add color</button>
  </div>
</div>

<div id="controls">
  <button id="resetBtn">Reset grid</button>
  <button id="exportBtn">Download .dat file</button>
  <button id="importBtn">Load .dat file</button>
  <input type="file" id="fileInput" accept=".dat,.txt" style="display:none">
</div>

<div id="status"></div>
<div id="log"></div>

<script>
  const SIZE = 18;
  const MIN_COLORS = 2;
  const MAX_COLORS = 12;

  // Each entry: { name, hex }. Index 0 is the "default" color (used on reset).
  let PALETTE = [
    { name: "White", hex: "#ffffff" },
    { name: "Green", hex: "#2ecc71" },
    { name: "Yellow", hex: "#f1c40f" },
    { name: "Red", hex: "#e74c3c" }
  ];

  const NEW_COLOR_SUGGESTIONS = [
    "#3498db", "#9b59b6", "#1abc9c", "#e67e22",
    "#34495e", "#ff6b81", "#2ecc71", "#f39c12"
  ];

  const grid = document.getElementById("grid");
  const statusEl = document.getElementById("status");
  const tooltip = document.getElementById("tooltip");

  // state[row][col] = current color index (0 = default color)
  const state = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));

  function cellName(row, col) {
    const x = (col + 1) * 10;
    const y = (row + 1) * 10;
    return `${x}_${y}`;
  }

  function countCells() {
    const counts = PALETTE.map(() => 0);
    for (let row = 0; row < SIZE; row++) {
      for (let col = 0; col < SIZE; col++) {
        counts[state[row][col]]++;
      }
    }
    return counts;
  }

  function renderLegend() {
    const legendEl = document.getElementById("legend");
    legendEl.innerHTML = "";
    const counts = countCells();
    PALETTE.forEach((color, index) => {
      const item = document.createElement("div");
      item.className = "legend-item";
      const swatch = document.createElement("span");
      swatch.className = "swatch";
      swatch.style.background = color.hex;
      const countSpan = document.createElement("span");
      countSpan.className = "legend-count";
      countSpan.textContent = `(${counts[index]})`;
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(color.name || "(unnamed)"));
      item.appendChild(countSpan);
      legendEl.appendChild(item);
    });
  }

  function renderPaletteEditor() {
    const listEl = document.getElementById("palette-list");
    listEl.innerHTML = "";

    PALETTE.forEach((color, index) => {
      const row = document.createElement("div");
      row.className = "palette-row";

      const colorInput = document.createElement("input");
      colorInput.type = "color";
      colorInput.value = color.hex;
      colorInput.addEventListener("input", () => {
        PALETTE[index].hex = colorInput.value;
        refreshColors();
      });

      const nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.value = color.name;
      nameInput.maxLength = 20;
      nameInput.addEventListener("input", () => {
        PALETTE[index].name = nameInput.value;
        renderLegend();
      });

      const removeBtn = document.createElement("button");
      removeBtn.className = "remove-color";
      removeBtn.textContent = "✕";
      removeBtn.title = "Remove this color";
      removeBtn.disabled = PALETTE.length <= MIN_COLORS;
      removeBtn.addEventListener("click", () => removeColor(index));

      row.appendChild(colorInput);
      row.appendChild(nameInput);
      row.appendChild(removeBtn);
      listEl.appendChild(row);
    });

    document.getElementById("addColorBtn").disabled = PALETTE.length >= MAX_COLORS;
  }

  function refreshColors() {
    // Re-applies current PALETTE colors to the grid and legend without touching state
    renderLegend();
    const cells = grid.querySelectorAll(".cell");
    cells.forEach((cellEl) => {
      const row = parseInt(cellEl.dataset.row, 10);
      const col = parseInt(cellEl.dataset.col, 10);
      cellEl.style.background = PALETTE[state[row][col]].hex;
    });
  }

  function addColor() {
    if (PALETTE.length >= MAX_COLORS) return;
    const suggestion = NEW_COLOR_SUGGESTIONS[PALETTE.length % NEW_COLOR_SUGGESTIONS.length];
    PALETTE.push({ name: `Color ${PALETTE.length + 1}`, hex: suggestion });
    renderPaletteEditor();
    renderLegend();
  }

  function removeColor(index) {
    if (PALETTE.length <= MIN_COLORS) return;

    // Any cell using the removed color falls back to the default color (index 0)
    // Any cell using a color after the removed one shifts its index down by 1
    let affected = 0;
    for (let row = 0; row < SIZE; row++) {
      for (let col = 0; col < SIZE; col++) {
        if (state[row][col] === index) {
          state[row][col] = 0;
          affected++;
        } else if (state[row][col] > index) {
          state[row][col] -= 1;
        }
      }
    }

    PALETTE.splice(index, 1);
    renderPaletteEditor();
    renderLegend();
    buildGrid();

    statusEl.textContent = affected > 0
      ? `Color removed. ${affected} cell(s) reset to "${PALETTE[0].name}".`
      : "Color removed.";
  }

  document.getElementById("addColorBtn").addEventListener("click", addColor);

  function buildLabels() {
    const colLabels = document.getElementById("col-labels");
    const rowLabels = document.getElementById("row-labels");
    colLabels.innerHTML = "";
    rowLabels.innerHTML = "";

    for (let col = 0; col < SIZE; col++) {
      const label = document.createElement("div");
      label.className = "axis-label";
      label.textContent = (col + 1) * 10;
      colLabels.appendChild(label);
    }

    for (let row = SIZE - 1; row >= 0; row--) {
      const label = document.createElement("div");
      label.className = "axis-label";
      label.textContent = (row + 1) * 10;
      rowLabels.appendChild(label);
    }
  }

  function buildGrid() {
    grid.innerHTML = "";
    for (let row = SIZE - 1; row >= 0; row--) {
      for (let col = 0; col < SIZE; col++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.row = row;
        cell.dataset.col = col;
        cell.style.background = PALETTE[state[row][col]].hex;
        cell.addEventListener("click", () => onCellClick(row, col, cell));
        cell.addEventListener("mouseenter", () => showTooltip(row, col));
        cell.addEventListener("mousemove", moveTooltip);
        cell.addEventListener("mouseleave", hideTooltip);
        grid.appendChild(cell);
      }
    }
  }

  function showTooltip(row, col) {
    tooltip.textContent = cellName(row, col);
    tooltip.style.display = "block";
  }

  function moveTooltip(event) {
    tooltip.style.left = (event.clientX + 12) + "px";
    tooltip.style.top = (event.clientY + 12) + "px";
  }

  function hideTooltip() {
    tooltip.style.display = "none";
  }

  function onCellClick(row, col, cellEl) {
    state[row][col] = (state[row][col] + 1) % PALETTE.length;
    cellEl.style.background = PALETTE[state[row][col]].hex;
    renderLegend();
  }

  function resetGrid() {
    for (let row = 0; row < SIZE; row++) {
      for (let col = 0; col < SIZE; col++) {
        state[row][col] = 0;
      }
    }
    buildGrid();
    statusEl.textContent = "";
    logWarnings([]);
    renderLegend();
  }

  function exportDat() {
    // Collect cells by color, row = Y, col = X (1-indexed, then multiplied by 10)
    const buckets = PALETTE.map(() => []);

    for (let row = 0; row < SIZE; row++) {
      for (let col = 0; col < SIZE; col++) {
        buckets[state[row][col]].push(cellName(row, col));
      }
    }

    let content = "";
    PALETTE.forEach((color, index) => {
      const label = (color.name || `Color ${index + 1}`).trim().toUpperCase();
      content += `# ${label}\n`;
      if (buckets[index].length === 0) {
        content += "(no cells)\n";
      } else {
        content += buckets[index].join("\n") + "\n";
      }
      content += "\n";
    });

    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "grid_cells.dat";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    statusEl.textContent = ".dat file downloaded.";
  }

  function logWarnings(warnings) {
    const logEl = document.getElementById("log");
    if (warnings.length === 0) {
      logEl.style.display = "none";
      logEl.innerHTML = "";
      return;
    }
    logEl.style.display = "block";
    logEl.innerHTML = `<div class="log-title">${warnings.length} issue(s) found while loading:</div>`;
    for (const w of warnings) {
      const line = document.createElement("div");
      line.textContent = "• " + w;
      logEl.appendChild(line);
    }
  }

  function importDat(text) {
    // Preliminary reset: all cells go back to white
    for (let row = 0; row < SIZE; row++) {
      for (let col = 0; col < SIZE; col++) {
        state[row][col] = 0;
      }
    }

    const warnings = [];
    const seenCells = {}; // cellName -> colorName, to detect duplicates
    let currentColorIndex = null;
    let currentColorRaw = null;
    const lines = text.split(/\r?\n/);

    lines.forEach((rawLine, i) => {
      const lineNum = i + 1;
      const line = rawLine.trim();
      if (line === "") return;
      if (line.startsWith("(")) return; // e.g. "(no cells)" placeholder, ignore silently

      // Header line like "# GREEN"
      const headerMatch = line.match(/^#\s*(.+)/);
      if (headerMatch) {
        const headerLabel = headerMatch[1].trim().toLowerCase();
        const idx = PALETTE.findIndex((c) => (c.name || "").trim().toLowerCase() === headerLabel);
        if (idx >= 0) {
          currentColorIndex = idx;
          currentColorRaw = PALETTE[idx].name;
        } else {
          currentColorIndex = null;
          currentColorRaw = null;
          warnings.push(`Line ${lineNum}: unrecognized color header "${rawLine.trim()}" (not in the current palette)`);
        }
        return;
      }

      // Cell line like "10_20"
      const cellMatch = line.match(/^(\d+)_(\d+)$/);
      if (!cellMatch) {
        warnings.push(`Line ${lineNum}: unrecognized line "${rawLine.trim()}"`);
        return;
      }

      if (currentColorIndex === null) {
        warnings.push(`Line ${lineNum}: cell "${line}" found before a valid color header, skipped`);
        return;
      }

      const x = parseInt(cellMatch[1], 10);
      const y = parseInt(cellMatch[2], 10);
      const col = x / 10 - 1;
      const row = y / 10 - 1;

      if (!Number.isInteger(col) || !Number.isInteger(row) || row < 0 || row >= SIZE || col < 0 || col >= SIZE) {
        warnings.push(`Line ${lineNum}: cell "${line}" is out of the 18x18 grid range, skipped`);
        return;
      }

      if (seenCells[line] && seenCells[line] !== currentColorRaw) {
        warnings.push(`Line ${lineNum}: cell "${line}" was already set as ${seenCells[line]}, now overwritten as ${currentColorRaw}`);
      }
      seenCells[line] = currentColorRaw;

      state[row][col] = currentColorIndex;
    });

    buildGrid();
    logWarnings(warnings);
    renderLegend();
    statusEl.textContent = warnings.length === 0
      ? ".dat file loaded successfully."
      : `.dat file loaded with ${warnings.length} issue(s), see log below.`;
  }

  document.getElementById("resetBtn").addEventListener("click", resetGrid);
  document.getElementById("exportBtn").addEventListener("click", exportDat);

  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("fileInput").click();
  });

  document.getElementById("fileInput").addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => importDat(e.target.result);
    reader.onerror = () => {
      statusEl.textContent = "Error while reading the file.";
    };
    reader.readAsText(file);
    // reset the input so the same file can be reloaded again
    event.target.value = "";
  });

  buildLabels();
  renderLegend();
  renderPaletteEditor();
  buildGrid();
</script>

</body>
</html>
